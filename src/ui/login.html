<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Fetcherr · Sign in</title>
  <link rel="icon" type="image/svg+xml" href="/ui/static/fetcherr.svg">
  <link rel="stylesheet" href="/ui/static/app.css">
</head>
<body class="auth-page login-page">
<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="bg-blob-tl"></div>
<div class="bg-blob-br"></div>
<div class="bg-orb"></div>

<form class="card" onsubmit="doLogin(event)">
  <div class="logo-wrap">
    <div class="logo-circle">
      <img src="/ui/static/fetcherr.svg" alt="Fetcherr">
    </div>
  </div>

  <h1>Sign in</h1>
  <p class="sub">Sign in to access the Fetcherr web UI.</p>

  <div class="field">
    <label for="username">Username</label>
    <input id="username" type="text" autocomplete="username">
  </div>
  <div class="field">
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password">
  </div>

  <button class="btn" id="loginBtn" type="submit">Sign in</button>
  <div class="error" id="errMsg"></div>
</form>

<script>
  function safeNextUrl(raw) {
    if (!raw || !raw.startsWith('/')) return '/ui/dashboard'
    if (raw.startsWith('//')) return '/ui/dashboard'
    return raw
  }

  async function doLogin(event) {
    event?.preventDefault()
    const btn = document.getElementById('loginBtn')
    const err = document.getElementById('errMsg')
    btn.disabled = true
    btn.textContent = 'Signing in…'
    err.style.display = 'none'
    try {
      const res = await fetch('/ui/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        }),
      })
      if (res.ok) {
        const params = new URLSearchParams(window.location.search)
        window.location.href = safeNextUrl(params.get('next'))
      } else {
        const d = await res.json().catch(() => ({}))
        err.textContent = d.error || 'Invalid credentials'
        err.style.display = ''
        btn.disabled = false
        btn.textContent = 'Sign in'
      }
    } catch {
      err.textContent = 'Network error. Please try again.'
      err.style.display = ''
      btn.disabled = false
      btn.textContent = 'Sign in'
    }
  }
</script>
</body>
</html>
