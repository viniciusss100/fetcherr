<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Fetcherr · Create Admin</title>
  <link rel="icon" type="image/svg+xml" href="/ui/static/fetcherr.svg">
  <link rel="stylesheet" href="/ui/static/app.css">
</head>
<body class="auth-page setup-admin-page">
  <form class="card" onsubmit="createAdmin(event)">
    <div class="logo"><img src="/ui/static/fetcherr.svg" alt="Fetcherr"></div>
    <h1>Create Admin Account</h1>
    <p class="sub">Finish first-time setup by creating the initial admin account. All other server settings can be configured after sign-in.</p>

    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="new-password">
    </div>

    <button class="btn" id="setupBtn" type="submit">Create Admin</button>
    <div class="error" id="errMsg"></div>
  </form>

  <script>
    async function createAdmin(event) {
      event?.preventDefault()
      const btn = document.getElementById('setupBtn')
      const err = document.getElementById('errMsg')
      btn.disabled = true
      btn.textContent = 'Creating…'
      err.style.display = 'none'
      try {
        const res = await fetch('/ui/auth/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        })
        if (res.ok) {
          window.location.href = '/ui/settings'
          return
        }
        const d = await res.json().catch(() => ({}))
        err.textContent = d.error || 'Unable to create admin account'
        err.style.display = ''
      } catch {
        err.textContent = 'Network error. Please try again.'
        err.style.display = ''
      } finally {
        btn.disabled = false
        btn.textContent = 'Create Admin'
      }
    }
  </script>
</body>
</html>
