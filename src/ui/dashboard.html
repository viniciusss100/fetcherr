<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Fetcherr</title>
  <link rel="icon" type="image/svg+xml" href="/ui/static/fetcherr.svg">
  <link rel="stylesheet" href="/ui/static/app.css">
</head>
<body class="app-shell-page dashboard-page">
<div class="shell">
  <nav class="topbar">
    <a href="/ui/dashboard" class="brand">
      <div class="brand-icon">
        <img src="/ui/static/fetcherr.svg" alt="Fetcherr">
      </div>
      <div>
        <div class="brand-name">Fetcherr</div>
      </div>
    </a>
    <div class="topbar-right">
      <a class="icon-btn" id="adminLogsBtn" href="/ui/logs" title="Logs" style="display:none">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </a>
      <a class="icon-btn" id="adminSettingsBtn" href="/ui/settings" title="Settings" style="display:none">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </a>
      <button class="icon-btn" id="logoutBtn" title="Sign out" style="display:none" onclick="doLogout()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
      </button>
    </div>
  </nav>

  <div class="page-header">
    <div>
      <h1 class="page-title">Library</h1>
      <p class="page-sub">Browse synced movies and shows, review status, and manage the library.</p>
    </div>
    <div class="header-actions">
      <button class="btn primary" id="syncBtn" onclick="triggerSync()">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Sync Trakt
      </button>
    </div>
  </div>

  <div class="stats">
    <div class="stat movies filterable" id="statCardMovies" onclick="switchTab('movies')">
      <div class="stat-value" id="statMovies">—</div>
      <div class="stat-label">Movies</div>
    </div>
    <div class="stat shows filterable" id="statCardShows" onclick="switchTab('shows')">
      <div class="stat-value" id="statShows">—</div>
      <div class="stat-label">TV Shows</div>
    </div>
  </div>

  <div class="sync-bar">
    <span>Last sync: <strong id="lastSync">—</strong></span>
    <span>Next sync: <strong id="nextSync">—</strong></span>
  </div>

  <div id="syncMsg" class="sync-msg">Sync started — library will update in a moment.</div>

  <div class="controls">
    <div class="search-field">
      <input type="text" id="searchInput" placeholder="Search…" oninput="onSearch()">
      <button type="button" class="search-clear" id="searchClear" title="Clear search" aria-label="Clear search" onclick="clearLibrarySearch()" hidden>
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <select id="sortSelect" onchange="onSortChange()">
      <option value="popularity:DESC">Most popular</option>
      <option value="dateAdded:DESC">Recently added</option>
      <option value="dateAdded:ASC">Oldest added</option>
      <option value="title:ASC">Title A→Z</option>
      <option value="title:DESC">Title Z→A</option>
      <option value="year:DESC">Newest release</option>
      <option value="year:ASC">Oldest release</option>
    </select>
    <button type="button" class="btn primary mobile-add-btn" onclick="openSearch()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      Add to Library
    </button>
  </div>

  <div class="items" id="itemsList"></div>
</div>

<!-- Library item details modal -->
<div class="modal-overlay" id="detailModal" onclick="closeDetailOnOverlay(event)">
  <div class="detail-modal">
    <div class="modal-head">
      <div class="modal-head-row">
        <h2 class="modal-title">Title Details</h2>
        <button class="modal-close" onclick="closeDetail()">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="detail-loading" id="detailLoading">Loading title details…</div>
    <div class="detail-body" id="detailBody" style="display:none"></div>
  </div>
</div>

<button class="fab" onclick="openSearch()" title="Add to Library">
  <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 5v14M5 12h14"/>
  </svg>
</button>

<!-- Add to Library modal -->
<div class="modal-overlay" id="searchModal" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-row">
        <h2 class="modal-title">Add to Library</h2>
        <button class="modal-close" onclick="closeSearch()">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="modal-search-row">
        <div class="search-field">
          <input id="searchQuery" type="text" placeholder="Search movies or TV shows…" oninput="onModalSearch()" autocomplete="off">
          <button type="button" class="search-clear" id="modalSearchClear" title="Clear search" aria-label="Clear search" onclick="clearModalSearch()" hidden>
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <div class="modal-toast" id="modalToast"></div>
    <div class="modal-body" id="searchResults">
      <div class="search-empty">Search for a title to add it to your library.</div>
    </div>
  </div>
</div>

<script>
  let currentTab = 'all'
  let searchTimer = null
  let openTvMenuTmdbId = null
  let activeDetailItem = null
  let activeDetailTab = 'overview'
  let activeDetailData = null
  let defaultShowAddMode = 'all'
  const librarySortStorageKey = 'fetcherr.librarySort'

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;')
  }

  function fmtRelTime(iso) {
    if (!iso) return '—'
    const diff = new Date(iso) - Date.now()
    const abs  = Math.abs(diff)
    const mins = Math.round(abs / 60000)
    const hrs  = Math.round(abs / 3600000)
    if (diff < 0) {
      if (mins < 60) return `${mins}m ago`
      return `${hrs}h ago`
    }
    if (mins < 60) return `in ${mins}m`
    return `in ${hrs}h`
  }

  function fmtDate(iso) {
    if (!iso) return '—'
    return new Date(iso).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
  }

  function fmtShortDate(iso) {
    if (!iso) return '—'
    return new Date(`${iso}T12:00:00Z`).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })
  }

  async function loadStats() {
    const res = await fetch('/ui/stats')
    if (!res.ok) return
    const d = await res.json()
    document.getElementById('statMovies').textContent = d.movies
    document.getElementById('statShows').textContent  = d.shows
    document.getElementById('lastSync').textContent   = d.lastSyncAt ? fmtDate(d.lastSyncAt) : '—'
    document.getElementById('nextSync').textContent   = d.nextSyncAt ? fmtRelTime(d.nextSyncAt) : '—'
  }

  function getSort() {
    const [sortBy, sortOrder] = document.getElementById('sortSelect').value.split(':')
    return { sortBy, sortOrder }
  }

  function restoreLibrarySort() {
    let savedSort = null
    try {
      savedSort = localStorage.getItem(librarySortStorageKey)
    } catch {
      return
    }
    if (!savedSort) return

    const sortSelect = document.getElementById('sortSelect')
    const hasOption = [...sortSelect.options].some(option => option.value === savedSort)
    if (hasOption) sortSelect.value = savedSort
  }

  function onSortChange() {
    try {
      localStorage.setItem(librarySortStorageKey, document.getElementById('sortSelect').value)
    } catch {}
    loadItems()
  }

  function setSearchClearState(inputId, buttonId) {
    const input = document.getElementById(inputId)
    const button = document.getElementById(buttonId)
    if (!input || !button) return
    button.hidden = input.value.length === 0
  }

  function renderItemsLoading() {
    document.getElementById('itemsList').innerHTML = `
      <div class="loading-list" aria-label="Loading library">
        ${Array.from({ length: 6 }).map(() => `
          <div class="skeleton-row">
            <div class="skeleton-poster"></div>
            <div class="skeleton-lines">
              <div class="skeleton-line"></div>
              <div class="skeleton-line short"></div>
            </div>
            <div class="skeleton-chip"></div>
          </div>
        `).join('')}
      </div>
    `
  }

  function emptyLibraryHtml(tab, search) {
    if (search) {
      return `<div class="empty">
        <div class="empty-title">No matches found</div>
        <div>Try a different title, year, or sort order.</div>
      </div>`
    }
    const label = tab === 'movies' ? 'movies' : tab === 'shows' ? 'shows' : 'titles'
    return `<div class="empty">
      <div class="empty-title">No ${label} in the library yet</div>
      <div>Start a sync or add a title manually.</div>
      <div class="empty-action">
        <button type="button" class="btn primary" onclick="openSearch()">Add to Library</button>
      </div>
    </div>`
  }

  function clearLibrarySearch() {
    const input = document.getElementById('searchInput')
    if (!input) return
    clearTimeout(searchTimer)
    input.value = ''
    setSearchClearState('searchInput', 'searchClear')
    loadItems()
    input.focus()
  }

  async function loadItems() {
    const requestedTab = currentTab
    const search = document.getElementById('searchInput').value.trim()
    const { sortBy, sortOrder } = getSort()
    const qs = `search=${encodeURIComponent(search)}&sortBy=${sortBy}&sortOrder=${sortOrder}&limit=200`
    renderItemsLoading()

    try {
      if (requestedTab === 'all') {
        const [rm, rs] = await Promise.all([
          fetch(`/ui/movies?${qs}`).then(r => r.ok ? r.json() : { items: [] }),
          fetch(`/ui/shows?${qs}`).then(r => r.ok ? r.json() : { items: [] }),
        ])
        if (document.getElementById('searchInput').value.trim() !== search || currentTab !== requestedTab) return
        const movies = rm.items.map(m => ({ ...m, _type: 'movies' }))
        const shows  = rs.items.map(s => ({ ...s, _type: 'shows' }))
        const merged = [...movies, ...shows].sort((a, b) => {
          if (sortBy === 'title') return sortOrder === 'ASC'
            ? a.title.localeCompare(b.title)
            : b.title.localeCompare(a.title)
          if (sortBy === 'year') {
            const aTime = a.releaseSortDate ? new Date(a.releaseSortDate).getTime() : (a.year || 0)
            const bTime = b.releaseSortDate ? new Date(b.releaseSortDate).getTime() : (b.year || 0)
            return sortOrder === 'ASC' ? aTime - bTime : bTime - aTime
          }
          if (sortBy === 'dateAdded') {
            const aTime = a.syncedAt ? new Date(a.syncedAt).getTime() : 0
            const bTime = b.syncedAt ? new Date(b.syncedAt).getTime() : 0
            return sortOrder === 'ASC' ? aTime - bTime : bTime - aTime
          }
          return sortOrder === 'ASC' ? a.popularity - b.popularity : b.popularity - a.popularity
        })
        renderItems(merged, 'all', search)
        return
      }

      const url = requestedTab === 'movies'
        ? `/ui/movies?${qs}`
        : `/ui/shows?${qs}`
      const res = await fetch(url)
      if (!res.ok) throw new Error('Library request failed')
      const d = await res.json()
      if (document.getElementById('searchInput').value.trim() !== search || currentTab !== requestedTab) return
      renderItems(d.items, requestedTab, search)
    } catch {
      document.getElementById('itemsList').innerHTML = `<div class="empty">
        <div class="empty-title">Unable to load library</div>
        <div>Refresh the page or check the logs if this keeps happening.</div>
      </div>`
    }
  }

  function renderItems(items, tab, search = '') {
    const el = document.getElementById('itemsList')
    if (!items.length) {
      el.innerHTML = emptyLibraryHtml(tab, search)
      return
    }
    el.innerHTML = items.map(item => {
      const itemType = item._type || tab  // 'movies' or 'shows'
      const isShow   = itemType === 'shows'
      const emoji    = isShow ? '📺' : '🎬'
      const poster   = item.posterUrl
        ? `<img class="item-poster" src="${item.posterUrl}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="item-poster-placeholder" style="display:none">${emoji}</div>`
        : `<div class="item-poster-placeholder">${emoji}</div>`

      const imdbLink = item.imdbId
        ? `<a class="item-link" href="https://www.imdb.com/title/${item.imdbId}" target="_blank" onclick="event.stopPropagation()">IMDb ↗</a>`
        : ''
      const removeBtn = item.manualAdded
        ? `<button class="btn-remove" title="Remove manual item" aria-label="Remove manual item" onclick="event.stopPropagation(); removeItem(${item.tmdbId}, '${isShow ? 'tv' : 'movie'}', this)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>`
        : ''
      const showModeToggle = isShow
        ? `<div class="item-mode-toggle" onclick="event.stopPropagation()">
             <button
               class="item-mode-btn ${item.libraryMode === 'all' ? 'active' : ''}"
               onclick="event.stopPropagation(); setShowLibraryMode(${item.tmdbId}, 'all', this)"
             >Entire Series</button>
             <button
               class="item-mode-btn ${item.libraryMode === 'latest' ? 'active' : ''}"
               onclick="event.stopPropagation(); setShowLibraryMode(${item.tmdbId}, 'latest', this)"
             >Latest Season</button>
           </div>`
        : ''

      let metaRight = ''
      if (tab === 'all') {
        const typePill = `<span class="pill ${isShow ? 'accent' : 'blue'}">${isShow ? 'TV Show' : 'Movie'}</span>`
        if (isShow) {
          const seasons = item.numSeasons
            ? `<span class="pill">${item.numSeasons} season${item.numSeasons !== 1 ? 's' : ''}</span>` : ''
          metaRight = typePill + seasons
        } else {
          const runtime = item.runtimeMins ? `<span class="pill">${item.runtimeMins}m</span>` : ''
          const pending = item.pendingLabel ? `<span class="pill amber">${item.pendingLabel}</span>` : ''
          metaRight = typePill + pending + runtime
        }
      } else if (!isShow) {
        const genres  = (item.genres || []).slice(0, 2).map(g => `<span class="pill">${g}</span>`).join('')
        const runtime = item.runtimeMins ? `<span class="pill">${item.runtimeMins}m</span>` : ''
        const pending = item.pendingLabel ? `<span class="pill amber">${item.pendingLabel}</span>` : ''
        metaRight = pending + genres + runtime
      } else {
        const statusColor = item.status === 'Ended' || item.status === 'Canceled' ? '' : 'green'
        const statusPill  = item.status ? `<span class="pill ${statusColor}">${item.status}</span>` : ''
        const seasons     = item.numSeasons
          ? `<span class="pill blue">${item.numSeasons} season${item.numSeasons !== 1 ? 's' : ''}</span>` : ''
        metaRight = statusPill + seasons
      }

      return `<div class="item ${showModeToggle ? 'has-mode-toggle' : ''}" onclick="activeDetailTab='overview'; openItemDetail('${isShow ? 'tv' : 'movie'}', ${item.tmdbId})">
        ${poster}
        <div class="item-body">
          <div class="item-title">${escapeHtml(item.title)}</div>
          <div class="item-meta">
            <span class="item-year">${escapeHtml(item.year || '')}</span>
            ${metaRight}
            ${imdbLink}
          </div>
        </div>
        <div class="item-actions">${showModeToggle}${removeBtn}</div>
      </div>`
    }).join('')
  }

  function switchTab(tab) {
    currentTab = currentTab === tab ? 'all' : tab
    document.getElementById('statCardMovies').classList.toggle('active', currentTab === 'movies')
    document.getElementById('statCardShows').classList.toggle('active', currentTab === 'shows')
    loadItems()
  }

  function onSearch() {
    setSearchClearState('searchInput', 'searchClear')
    clearTimeout(searchTimer)
    searchTimer = setTimeout(loadItems, 250)
  }

  async function triggerSync() {
    const btn = document.getElementById('syncBtn')
    btn.disabled = true
    btn.textContent = 'Syncing…'
    try {
      await fetch('/sync', { method: 'POST' })
      const msg = document.getElementById('syncMsg')
      msg.style.display = 'block'
      setTimeout(() => { msg.style.display = 'none' }, 5000)
    } finally {
      btn.disabled = false
      btn.innerHTML = `<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Sync Trakt`
    }
  }

  function showSyncMsg(text) {
    const msg = document.getElementById('syncMsg')
    msg.textContent = text
    msg.style.display = 'block'
    setTimeout(() => { msg.style.display = 'none' }, 5000)
  }

  async function removeItem(tmdbId, type, btn) {
    btn.disabled = true
    const icon = btn.innerHTML
    btn.innerHTML = '…'
    const res = await fetch('/ui/library/remove', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tmdbId, type }),
    })
    const d = await res.json().catch(() => ({}))
    if (!res.ok) {
      btn.disabled = false
      btn.innerHTML = icon
      showSyncMsg(d.error || 'Failed to remove item from library.')
      return
    }

    if (d.removedFromLibrary) {
      showSyncMsg('Removed from library.')
    } else if (d.removedManual && d.stillPresent) {
      showSyncMsg('Removed manual library entry. Item remains via another source.')
    } else if (!d.removedManual) {
      showSyncMsg('Item is not manually added.')
    } else {
      showSyncMsg('Updated library sources.')
    }

    if (activeDetailItem && activeDetailItem.tmdbId === tmdbId && activeDetailItem.type === type) {
      closeDetail()
    }
    await Promise.all([loadStats(), loadItems()])
  }

  async function openItemDetail(type, tmdbId) {
    activeDetailItem = { type, tmdbId }
    document.getElementById('detailModal').classList.add('open')
    document.getElementById('detailLoading').style.display = ''
    document.getElementById('detailBody').style.display = 'none'
    document.getElementById('detailBody').innerHTML = ''
    document.removeEventListener('keydown', onDetailKey)
    document.addEventListener('keydown', onDetailKey)

    const res = await fetch(`/ui/library/item?type=${encodeURIComponent(type)}&tmdbId=${tmdbId}`)
    const data = await res.json().catch(() => ({}))
    if (!res.ok) {
      document.getElementById('detailLoading').textContent = data.error || 'Failed to load title details.'
      return
    }

    activeDetailData = data
    renderDetail(data)
    document.getElementById('detailLoading').style.display = 'none'
    document.getElementById('detailBody').style.display = ''
  }

  function closeDetail() {
    activeDetailItem = null
    activeDetailData = null
    document.getElementById('detailModal').classList.remove('open')
    document.getElementById('detailBody').innerHTML = ''
    document.getElementById('detailLoading').textContent = 'Loading title details…'
    document.removeEventListener('keydown', onDetailKey)
  }

  function closeDetailOnOverlay(e) {
    if (e.target === document.getElementById('detailModal')) closeDetail()
  }

  function onDetailKey(e) {
    if (e.key === 'Escape') closeDetail()
  }

  function setDetailTab(tab) {
    activeDetailTab = tab
    if (activeDetailData) renderDetail(activeDetailData)
  }

  function renderDetail(item) {
    const isShow = item.type === 'tv'
    const poster = item.posterUrl
      ? `<img class="detail-poster" src="${item.posterUrl}" alt="">`
      : `<div class="detail-poster-ph">${isShow ? '📺' : '🎬'}</div>`
    const libraryPill = item.visibleToInfuse
      ? '<span class="pill green">Visible to Infuse</span>'
      : '<span class="pill amber">Hidden from Infuse</span>'
    const manualPill = item.manualAdded
      ? '<span class="pill blue">Manually Added</span>'
      : ''
    const imdbLink = item.imdbId
      ? `<a class="btn" href="https://www.imdb.com/title/${item.imdbId}" target="_blank" rel="noreferrer">IMDb ↗</a>`
      : ''
    const libraryModeValue = item.libraryMode === 'latest' ? 'Latest Season' : 'Entire Series'
    const hasCollection = !isShow && Array.isArray(item.collectionItems) && item.collectionItems.length > 0
    if (!hasCollection && activeDetailTab === 'collection') activeDetailTab = 'overview'

    let timingCard = ''
    if (isShow) {
      const nextEpisodeValue = item.nextEpisodeAirDate
        ? `${fmtShortDate(item.nextEpisodeAirDate)}${item.nextEpisodeName ? ` · ${escapeHtml(item.nextEpisodeName)}` : ''}`
        : 'No upcoming episode on record'
      const nextEpisodeCode = item.nextEpisodeSeasonNumber && item.nextEpisodeEpisodeNumber
        ? `S${item.nextEpisodeSeasonNumber}E${item.nextEpisodeEpisodeNumber}`
        : '—'
      timingCard = `
        <div class="detail-card">
          <h3>Episode Timing</h3>
          <div class="detail-row">
            <div class="detail-label">Next expected air date</div>
            <div class="detail-value">${nextEpisodeValue}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">Episode</div>
            <div class="detail-value">${nextEpisodeCode}</div>
          </div>
        </div>
      `
    } else {
      timingCard = `
        <div class="detail-card">
          <h3>Release Timing</h3>
          <div class="detail-row">
            <div class="detail-label">Expected eligible date</div>
            <div class="detail-value">${fmtShortDate(item.eligibleDate)}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">Digital release date</div>
            <div class="detail-value">${fmtShortDate(item.digitalReleaseDate)}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">Theatrical release date</div>
            <div class="detail-value">${fmtShortDate(item.releaseDate)}</div>
          </div>
        </div>
      `
    }

    const statusCard = `
      <div class="detail-card">
        <h3>Library Status</h3>
        <div class="detail-row">
          <div class="detail-label">Status</div>
          <div class="detail-value">${escapeHtml(item.libraryStatusLabel || '—')}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Visible to Infuse</div>
          <div class="detail-value">${item.visibleToInfuse ? 'Yes' : 'No'}</div>
        </div>
        ${item.inLibrary && isShow ? `
          <div class="detail-row">
            <div class="detail-label">Series mode</div>
            <div class="detail-value">${escapeHtml(libraryModeValue)}</div>
          </div>
        ` : item.manualAdded ? `
          <div class="detail-row">
            <div class="detail-label">Library source</div>
            <div class="detail-value">Manual Movie</div>
          </div>
        ` : ''}
        ${isShow ? `
          <div class="detail-row">
            <div class="detail-label">Series status</div>
            <div class="detail-value">${escapeHtml(item.status || '—')}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">Seasons</div>
            <div class="detail-value">${escapeHtml(item.numSeasons || '—')}</div>
          </div>
        ` : ''}
      </div>
    `

    const movieOverrideCard = (!isShow && (!item.visibleToInfuse || item.releaseGateOverridden))
      ? `
        <div class="toggle-card">
          <div class="toggle-copy">
            <p class="toggle-title">Release Window</p>
            <p class="toggle-sub">${item.releaseGateOverridden
              ? `Added early via override. Switch back to wait for your default ${escapeHtml((item.releaseWindowLabel || 'release window').toLowerCase())} before showing it in clients.`
              : `This film has not reached your current ${escapeHtml((item.releaseWindowLabel || 'release window').toLowerCase())}${item.eligibleDate ? ` (est. ${fmtShortDate(item.eligibleDate)})` : ''}. Add it now or wait.`}</p>
          </div>
          <button
            class="btn"
            onclick="toggleMovieAvailabilityOverride(${item.tmdbId}, ${item.releaseGateOverridden ? 'false' : 'true'}, this)"
          >${item.releaseGateOverridden ? `Wait for ${escapeHtml(item.releaseWindowLabel || 'Default Window')}` : 'Add Now'}</button>
        </div>
      `
      : ''

    const showModeCard = (isShow && item.inLibrary)
      ? `
        <div class="toggle-card">
          <div class="toggle-copy">
            <p class="toggle-title">Series Mode</p>
            <p class="toggle-sub">Choose whether Fetcherr keeps the whole series visible in clients or limits this show to its latest season.</p>
          </div>
          <div class="item-actions">
            <button
              class="btn ${item.libraryMode === 'all' ? 'btn-primary' : ''}"
              onclick="setShowLibraryMode(${item.tmdbId}, 'all', this, true)"
            >Entire Series</button>
            <button
              class="btn ${item.libraryMode === 'latest' ? 'btn-primary' : ''}"
              onclick="setShowLibraryMode(${item.tmdbId}, 'latest', this, true)"
            >Latest Season</button>
          </div>
        </div>
      `
      : ''

    const removeAction = item.manualAdded
      ? `<button class="btn btn-danger" onclick="removeItem(${item.tmdbId}, '${item.type}', this)">Remove from Library</button>`
      : ''

    const tabs = hasCollection
      ? `
        <div class="detail-tabs">
          <button class="detail-tab ${activeDetailTab === 'overview' ? 'active' : ''}" onclick="setDetailTab('overview')">Overview</button>
          <button class="detail-tab ${activeDetailTab === 'collection' ? 'active' : ''}" onclick="setDetailTab('collection')">Collection</button>
        </div>
      `
      : ''

    const collectionPanel = hasCollection
      ? `
        <div class="collection-list">
          ${item.collectionItems.map(entry => {
            const poster = entry.posterUrl
              ? `<img class="collection-item-poster" src="${entry.posterUrl}" alt="">`
              : '<div class="collection-item-ph">🎬</div>'
            const action = entry.inLibrary
              ? '<span class="badge-in-lib">In Library</span>'
              : `<button class="btn-add" onclick="addCollectionMovie(${entry.tmdbId}, this)">Add</button>`
            return `
              <div class="collection-item">
                ${poster}
                <div class="collection-item-body">
                  <div class="collection-item-title">${escapeHtml(entry.title)}</div>
                  <div class="collection-item-meta">
                    <span>${escapeHtml(entry.year || '—')}</span>
                    <span class="pill">Movie</span>
                    <span>${fmtShortDate(entry.releaseDate)}</span>
                  </div>
                </div>
                <div class="item-actions">${action}</div>
              </div>
            `
          }).join('')}
        </div>
      `
      : ''

    const overviewPanel = `
      <div class="detail-hero">
        ${poster}
        <div class="detail-copy">
          <h2 class="detail-title">${escapeHtml(item.title)}${item.year ? ` <span class="detail-year">(${escapeHtml(item.year)})</span>` : ''}</h2>
          <div class="detail-meta">
            ${libraryPill}
            ${manualPill}
          </div>
          <p class="detail-overview">${escapeHtml(item.overview || 'No description available yet.')}</p>
        </div>
      </div>
      <div class="detail-grid">
        ${statusCard}
        ${timingCard}
      </div>
      ${showModeCard}
      ${movieOverrideCard}
      <div class="detail-actions">
        ${imdbLink}
        ${removeAction}
      </div>
    `

    document.getElementById('detailBody').innerHTML = `
      ${tabs}
      ${activeDetailTab === 'collection' ? collectionPanel : overviewPanel}
    `
  }

  async function toggleMovieAvailabilityOverride(tmdbId, ignoreReleaseGate, btn) {
    btn.disabled = true
    const original = btn.textContent
    btn.textContent = 'Updating…'
    const res = await fetch('/ui/library/movie-availability', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tmdbId, ignoreReleaseGate }),
    })
    const data = await res.json().catch(() => ({}))
    if (!res.ok) {
      btn.disabled = false
      btn.textContent = original
      showSyncMsg(data.error || 'Failed to update movie availability.')
      return
    }
    showSyncMsg(ignoreReleaseGate ? 'Movie added ahead of digital release.' : 'Movie will wait for digital release again.')
    await Promise.all([
      loadItems(),
      loadStats(),
      openItemDetail('movie', tmdbId),
    ])
  }

  async function setShowLibraryMode(tmdbId, mode, btn, refreshDetail = false) {
    const container = btn.closest('.item-actions') || btn.parentElement
    const buttons = container ? [...container.querySelectorAll('button')] : [btn]
    buttons.forEach(el => { el.disabled = true })
    const res = await fetch('/ui/library/show-mode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tmdbId, mode }),
    })
    const data = await res.json().catch(() => ({}))
    if (!res.ok) {
      buttons.forEach(el => { el.disabled = false })
      showSyncMsg(data.error || 'Failed to update series mode.')
      return
    }
    showSyncMsg(`"${data.title}" set to ${mode === 'latest' ? 'latest season' : 'entire series'}.`)
    const updates = [loadItems(), loadStats()]
    if (refreshDetail) updates.push(openItemDetail('tv', tmdbId))
    await Promise.all(updates)
  }

  async function addCollectionMovie(tmdbId, btn) {
    btn.disabled = true
    const original = btn.textContent
    btn.textContent = 'Adding…'
    const res = await fetch('/ui/library/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tmdbId, type: 'movie', mode: 'all' }),
    })
    const data = await res.json().catch(() => ({}))
    if (!res.ok) {
      btn.disabled = false
      btn.textContent = original
      showSyncMsg(data.error || 'Failed to add movie.')
      return
    }
    showSyncMsg(`"${data.title}" added to library.`)
    await Promise.all([
      loadItems(),
      loadStats(),
      openItemDetail(activeDetailItem?.type || 'movie', activeDetailItem?.tmdbId || tmdbId),
    ])
  }

  async function doLogout() {
    await fetch('/ui/auth/logout', { method: 'POST' })
    window.location.href = '/ui/login'
  }

  async function checkAuth() {
    const res = await fetch('/ui/auth/check')
    if (res.status === 401) { window.location.href = '/ui/login'; return }
    if (res.ok) {
      const d = await res.json()
      if (d.authEnabled) document.getElementById('logoutBtn').style.display = ''
      if (d.role === 'admin') {
        document.getElementById('adminLogsBtn').style.display = ''
        document.getElementById('adminSettingsBtn').style.display = ''
      }
    }
  }

  async function loadClientConfig() {
    const res = await fetch('/ui/client-config')
    if (!res.ok) return
    const d = await res.json().catch(() => ({}))
    defaultShowAddMode = d.showAddDefaultMode === 'latest' ? 'latest' : 'all'
  }

  restoreLibrarySort()
  loadStats()
  loadClientConfig()
  loadItems()
  checkAuth()
  setInterval(loadStats, 60000)

  // ── Search modal ────────────────────────────────────────────────────────────
  let searchTimer2 = null
  const inLibrarySet = new Set()
  const modalSearchPromptHtml = `<div class="search-empty">
    <div class="empty-title">Search the catalog</div>
    <div>Find a movie or TV show, then choose how Fetcherr should add it.</div>
  </div>`

  function openSearch() {
    document.getElementById('searchModal').classList.add('open')
    setSearchClearState('searchQuery', 'modalSearchClear')
    document.getElementById('searchQuery').focus()
    document.addEventListener('keydown', onModalKey)
  }

  function closeSearch() {
    document.getElementById('searchModal').classList.remove('open')
    document.removeEventListener('keydown', onModalKey)
    openTvMenuTmdbId = null
  }

  function closeOnOverlay(e) {
    if (e.target === document.getElementById('searchModal')) closeSearch()
  }

  function onModalKey(e) { if (e.key === 'Escape') closeSearch() }

  function onModalSearch() {
    setSearchClearState('searchQuery', 'modalSearchClear')
    clearTimeout(searchTimer2)
    searchTimer2 = setTimeout(runSearch, 350)
  }

  function clearModalSearch() {
    const input = document.getElementById('searchQuery')
    if (!input) return
    clearTimeout(searchTimer2)
    input.value = ''
    openTvMenuTmdbId = null
    setSearchClearState('searchQuery', 'modalSearchClear')
    document.getElementById('searchResults').innerHTML = modalSearchPromptHtml
    input.focus()
  }

  async function runSearch() {
    const q  = document.getElementById('searchQuery').value.trim()
    const el = document.getElementById('searchResults')
    if (q.length < 2) {
      el.innerHTML = modalSearchPromptHtml
      return
    }
    el.innerHTML = `<div class="search-empty">
      <div class="empty-title">Searching catalog</div>
      <div>Checking TMDB for matching titles.</div>
    </div>`
    const qs = encodeURIComponent(q)
    const [rm, rt] = await Promise.all([
      fetch(`/ui/search?q=${qs}&type=movie`).then(r => r.ok ? r.json() : { results: [] }).catch(() => ({ results: [] })),
      fetch(`/ui/search?q=${qs}&type=tv`).then(r => r.ok ? r.json() : { results: [] }).catch(() => ({ results: [] })),
    ])
    if (document.getElementById('searchQuery').value.trim() !== q) return
    // Interleave movie and TV results so both types surface early
    const movies = rm.results ?? [], tv = rt.results ?? []
    const results = []
    for (let i = 0; i < Math.max(movies.length, tv.length); i++) {
      if (i < movies.length) results.push(movies[i])
      if (i < tv.length) results.push(tv[i])
    }
    if (!results.length) {
      el.innerHTML = `<div class="search-empty">
        <div class="empty-title">No results found</div>
        <div>Try a shorter title or remove the year.</div>
      </div>`
      return
    }
    el.innerHTML = results.map(r => {
      const poster = r.poster
        ? `<img class="result-poster" src="${r.poster}" alt="" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
          + `<div class="result-poster-ph" style="display:none">${r.type === 'tv' ? '📺' : '🎬'}</div>`
        : `<div class="result-poster-ph">${r.type === 'tv' ? '📺' : '🎬'}</div>`
      const tvPrimaryMode = defaultShowAddMode === 'latest' ? 'latest' : 'all'
      const tvSecondaryMode = tvPrimaryMode === 'latest' ? 'all' : 'latest'
      const action = r.inLibrary || inLibrarySet.has(r.tmdbId)
        ? `<span class="badge-in-lib">In Library</span>`
        : r.type === 'tv'
          ? `<div class="result-action-stack">
              <button class="btn-add icon" title="Add TV show" aria-label="Add TV show" onclick="toggleTvAddMenu(${r.tmdbId}, event)">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 5v14M5 12h14"/>
                </svg>
              </button>
              <div class="tv-add-menu ${openTvMenuTmdbId === r.tmdbId ? 'open' : ''}" id="tvAddMenu-${r.tmdbId}" onclick="event.stopPropagation()">
                <button class="btn-add" onclick="addItem(${r.tmdbId},'${r.type}','${tvPrimaryMode}',this)">${tvPrimaryMode === 'latest' ? 'Latest Season' : 'Entire Series'}</button>
                <button class="btn-add secondary" onclick="addItem(${r.tmdbId},'${r.type}','${tvSecondaryMode}',this)">${tvSecondaryMode === 'latest' ? 'Latest Season' : 'Entire Series'}</button>
              </div>
            </div>`
          : `<button class="btn-add icon" title="Add movie" aria-label="Add movie" onclick="addItem(${r.tmdbId},'${r.type}','all',this)">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14M5 12h14"/>
              </svg>
            </button>`
      return `<div class="search-result">
        ${poster}
        <div class="result-body">
          <div class="result-title">${escapeHtml(r.title)}</div>
          <div class="result-meta">
            <span>${escapeHtml(r.year || '—')}</span>
            <span class="pill">${r.type === 'tv' ? 'TV Show' : 'Movie'}</span>
          </div>
        </div>
        <div class="result-actions">${action}</div>
      </div>`
    }).join('')
  }

  function toggleTvAddMenu(tmdbId, event) {
    event.stopPropagation()
    const previous = openTvMenuTmdbId
    openTvMenuTmdbId = openTvMenuTmdbId === tmdbId ? null : tmdbId

    if (previous != null && previous !== tmdbId) {
      const prevMenu = document.getElementById(`tvAddMenu-${previous}`)
      if (prevMenu) prevMenu.classList.remove('open')
    }

    const currentMenu = document.getElementById(`tvAddMenu-${tmdbId}`)
    if (currentMenu) currentMenu.classList.toggle('open', openTvMenuTmdbId === tmdbId)
  }

  document.addEventListener('click', () => {
    if (openTvMenuTmdbId == null) return
    const menu = document.getElementById(`tvAddMenu-${openTvMenuTmdbId}`)
    if (menu) menu.classList.remove('open')
    openTvMenuTmdbId = null
  })

  async function addItem(tmdbId, type, mode, btn) {
    const actions = btn.closest('.result-actions')
    const buttons = actions ? [...actions.querySelectorAll('button')] : [btn]
    buttons.forEach(el => { el.disabled = true })
    btn.disabled = true
    btn.textContent = 'Adding…'
    const res = await fetch('/ui/library/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tmdbId, type, mode }),
    })
    const d = await res.json().catch(() => ({}))
    if (res.ok) {
      inLibrarySet.add(tmdbId)
      openTvMenuTmdbId = null
      const badge = Object.assign(document.createElement('span'), { className: 'badge-in-lib', textContent: 'In Library' })
      if (actions) actions.replaceWith(badge)
      else btn.replaceWith(badge)
      showModalToast(`"${d.title}" added as ${type === 'tv' && mode === 'latest' ? 'latest season' : (type === 'tv' ? 'entire series' : 'movie')}.`, 'success')
      Promise.all([loadStats(), loadItems()])
    } else {
      buttons.forEach(el => { el.disabled = false })
      btn.innerHTML = mode === 'latest'
        ? 'Latest Season'
        : (type === 'tv'
          ? 'Entire Series'
          : `<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
               <path d="M12 5v14M5 12h14"/>
             </svg>`)
      showModalToast(d.error || 'Failed to add item.', 'error')
    }
  }

  function showModalToast(msg, kind) {
    const el = document.getElementById('modalToast')
    el.textContent = msg
    el.className = `modal-toast ${kind}`
    el.style.display = ''
    setTimeout(() => { el.style.display = 'none' }, 4000)
  }
</script>
</body>
</html>
