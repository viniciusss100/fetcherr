<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Fetcherr</title>
  <link rel="icon" type="image/svg+xml" href="/ui/static/fetcherr.svg">
  <style>
    :root {
      --bg: #0b0d12;
      --surface: #12151d;
      --surface-raised: #181c26;
      --border: rgba(255,255,255,.07);
      --border-strong: rgba(255,255,255,.12);
      --text: #eef2ff;
      --muted: #8892a4;
      --accent: #9d6ef0;
      --accent-dim: rgba(157,110,240,.15);
      --accent-border: rgba(157,110,240,.35);
      --green: #4ade80;
      --green-dim: rgba(74,222,128,.12);
      --green-border: rgba(74,222,128,.3);
      --amber: #fbbf24;
      --amber-dim: rgba(251,191,36,.1);
      --amber-border: rgba(251,191,36,.28);
      --red: #f87171;
      --red-dim: rgba(248,113,113,.1);
      --red-border: rgba(248,113,113,.28);
      --blue: #60a5fa;
      --blue-dim: rgba(96,165,250,.1);
      --blue-border: rgba(96,165,250,.28);
      --slate-dim: rgba(148,163,184,.08);
      --slate-border: rgba(148,163,184,.2);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .shell { max-width: 1200px; margin: 0 auto; padding: 20px 20px 80px; }

    /* Topbar */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 10px 14px; border-radius: 16px;
      border: 1px solid var(--border); background: var(--surface); margin-bottom: 20px;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
    .brand-icon {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--accent-dim); border: 1px solid var(--accent-border);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .brand-icon svg { width: 16px; height: 16px; color: #c4b5fd; }
    .brand-name { font-size: 16px; font-weight: 650; letter-spacing: -.01em; }
    .brand-tag { font-size: 11px; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; }
    .topbar-right { display: flex; gap: 8px; align-items: center; }
    .icon-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer;
      text-decoration: none; transition: color .15s, background .15s;
    }
    .icon-btn:hover { color: var(--text); background: var(--surface-raised); }

    /* Page header */
    .page-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .page-title { font-size: 26px; font-weight: 700; margin: 0 0 4px; letter-spacing: -.02em; }
    .page-sub { font-size: 13px; color: var(--muted); margin: 0; }
    .header-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px;
      border-radius: 10px; border: 1px solid var(--border); background: var(--surface-raised);
      color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer;
      text-decoration: none; transition: background .15s, border-color .15s; white-space: nowrap;
      font-family: inherit;
    }
    .btn:hover { background: rgba(255,255,255,.06); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn.primary { background: var(--accent-dim); border-color: var(--accent-border); color: #d6b8ff; }
    .btn.primary:hover { background: rgba(157,110,240,.22); }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 10px; margin-bottom: 16px; }
    .stat {
      padding: 14px 16px; border-radius: 14px; border: 1px solid var(--border);
      background: var(--surface); cursor: default;
    }
    .stat.filterable { cursor: pointer; transition: background .15s, border-color .15s, transform .15s; }
    .stat.filterable:hover { background: var(--surface-raised); border-color: var(--border-strong); transform: translateY(-1px); }
    .stat.active { background: var(--surface-raised); border-color: var(--border-strong); box-shadow: inset 0 0 0 1px rgba(255,255,255,.04); }
    .stat-value { font-size: 26px; font-weight: 700; letter-spacing: -.02em; line-height: 1; margin-bottom: 5px; }
    .stat-label { font-size: 12px; color: var(--muted); }
    .stat.movies   .stat-value { color: var(--green); }
    .stat.shows    .stat-value { color: var(--accent); }

    /* Sync bar */
    .sync-bar {
      display: flex; gap: 20px; flex-wrap: wrap; font-size: 12px; color: var(--muted);
      margin-bottom: 18px; padding: 10px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--surface);
    }
    .sync-bar span { white-space: nowrap; }
    .sync-bar strong { color: var(--text); font-weight: 500; }

    /* Controls */
    .controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .controls input, .controls select {
      padding: 9px 12px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-size: 13px;
      font-family: inherit; outline: none; transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .controls input { flex: 1; min-width: 160px; }
    .controls select { flex-shrink: 0; cursor: pointer; }
    .controls input {
      border-color: rgba(157,110,240,.2);
      background:
        linear-gradient(180deg, rgba(157,110,240,.07), rgba(157,110,240,.03)),
        var(--surface);
    }
    .controls input:focus, .controls select:focus {
      border-color: var(--accent-border);
      box-shadow: 0 0 0 3px rgba(157,110,240,.12);
    }
    .controls select option { background: #1e2230; }

    /* Items */
    .items { display: flex; flex-direction: column; gap: 6px; }
    .item {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px;
      border-radius: 12px; border: 1px solid var(--border); background: var(--surface);
      transition: border-color .15s, background .15s; cursor: pointer;
    }
    .item:hover { background: var(--surface-raised); border-color: var(--border-strong); }
    .item-poster {
      width: 36px; height: 54px; border-radius: 6px; object-fit: cover;
      background: var(--surface-raised); flex-shrink: 0; border: 1px solid var(--border);
    }
    .item-poster-placeholder {
      width: 36px; height: 54px; border-radius: 6px; background: var(--surface-raised);
      border: 1px solid var(--border); flex-shrink: 0; display: flex;
      align-items: center; justify-content: center; font-size: 18px;
    }
    .item-body { flex: 1; min-width: 0; }
    .item-title {
      font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; margin-bottom: 3px;
    }
    .item-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .item-year { font-size: 12px; color: var(--muted); }
    .pill {
      display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px;
      border-radius: 5px; font-size: 11px; font-weight: 500; border: 1px solid var(--border);
      color: var(--muted); background: transparent; white-space: nowrap;
    }
    .pill.green  { border-color: var(--green-border);  background: var(--green-dim);  color: #bbf7d0; }
    .pill.accent { border-color: var(--accent-border); background: var(--accent-dim); color: #d6b8ff; }
    .pill.blue   { border-color: var(--blue-border);   background: var(--blue-dim);   color: #bfdbfe; }
    .pill.amber  { border-color: var(--amber-border);  background: var(--amber-dim);  color: #fef3c7; }
    .item-link { font-size: 11px; color: var(--muted); text-decoration: none; }
    .item-link:hover { color: var(--text); }
    .item-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: auto; }
    .item-mode-toggle { display: inline-flex; gap: 4px; }
    .item-mode-btn {
      padding: 5px 8px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface-raised); color: var(--muted); font-size: 11px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: border-color .15s, background .15s, color .15s;
    }
    .item-mode-btn:hover { color: var(--text); background: rgba(255,255,255,.06); }
    .item-mode-btn.active {
      color: #d6b8ff; background: var(--accent-dim); border-color: var(--accent-border);
    }
    .item-mode-btn:disabled { opacity: .55; cursor: not-allowed; }

    /* Empty state */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }

    /* Sync feedback */
    .sync-msg {
      margin-bottom: 14px; padding: 10px 14px; border-radius: 10px; font-size: 13px;
      border: 1px solid var(--green-border); background: var(--green-dim); color: #bbf7d0;
      display: none;
    }

    @media (max-width: 600px) {
      .shell { padding: 14px 12px 78px; }
      .topbar { border-radius: 14px; }
      .page-header { flex-direction: column; align-items: flex-start; }
      .header-actions, .header-actions .btn { width: 100%; }
      .header-actions .btn { justify-content: center; }
      .stats { grid-template-columns: repeat(2,1fr); }
      .sync-bar { flex-direction: column; gap: 6px; }
      .sync-bar span { white-space: normal; }
      .controls { flex-direction: column; }
      .controls input, .controls select { width: 100%; }
      .item { align-items: flex-start; flex-wrap: wrap; gap: 10px; }
      .item-body { flex: 1 1 calc(100% - 52px); }
      .item-title { white-space: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
      .item-actions {
        width: 100%;
        margin-left: 0;
        padding-left: 48px;
        justify-content: flex-start;
        align-items: stretch;
        flex-wrap: wrap;
      }
      .item-mode-toggle {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        width: 100%;
      }
      .item-mode-btn { flex: 1; text-align: center; }
      .btn-remove {
        width: 38px;
        height: 38px;
        flex-shrink: 0;
        margin-left: auto;
      }
    }

    /* Search modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.72); backdrop-filter: blur(4px);
      display: none; align-items: flex-start; justify-content: center;
      padding: 60px 20px 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      width: 100%; max-width: 560px; max-height: calc(100dvh - 100px);
      display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border-strong);
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
    }
    .modal-head {
      padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 12px; flex-shrink: 0;
    }
    .modal-head-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .modal-title { font-size: 16px; font-weight: 700; margin: 0; letter-spacing: -.01em; }
    .modal-close { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; display: flex; border-radius: 6px; transition: color .15s, background .15s; }
    .modal-close:hover { color: var(--text); background: var(--surface-raised); }
    .modal-search-row { display: flex; gap: 8px; }
    .modal-search-row input {
      flex: 1; padding: 9px 12px; border-radius: 10px;
      border: 1px solid rgba(157,110,240,.24);
      background:
        linear-gradient(180deg, rgba(157,110,240,.08), rgba(157,110,240,.03)),
        var(--surface-raised);
      color: var(--text); font-size: 14px; font-family: inherit; outline: none;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .modal-search-row input:focus {
      border-color: var(--accent-border);
      box-shadow: 0 0 0 3px rgba(157,110,240,.12);
      background:
        linear-gradient(180deg, rgba(157,110,240,.12), rgba(157,110,240,.05)),
        var(--surface-raised);
    }
    .fab { position: fixed; bottom: max(28px, calc(env(safe-area-inset-bottom) + 16px)); right: max(28px, calc(env(safe-area-inset-right) + 16px)); width: 52px; height: 52px; border-radius: 50%; background: var(--accent); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(157,110,240,.45); transition: transform .15s, box-shadow .15s; z-index: 100; }
    .fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(157,110,240,.6); }
    .modal-body { overflow-y: auto; padding: 12px; flex: 1; }
    .search-empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
    .search-result {
      display: flex; align-items: center; gap: 12px; padding: 10px 10px;
      border-radius: 12px; border: 1px solid transparent;
      transition: background .12s, border-color .12s;
    }
    .search-result:hover { background: var(--surface-raised); border-color: var(--border); }
    .result-poster { width: 36px; height: 54px; border-radius: 6px; object-fit: cover; background: var(--surface-raised); border: 1px solid var(--border); flex-shrink: 0; }
    .result-poster-ph { width: 36px; height: 54px; border-radius: 6px; background: var(--surface-raised); border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .result-body { flex: 1; min-width: 0; }
    .result-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .result-meta { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .result-actions { flex-shrink: 0; position: relative; }
    .result-action-stack { display: flex; align-items: center; justify-content: flex-end; }
    .btn-add { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--accent-border); background: var(--accent-dim); color: #d6b8ff; font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; transition: background .15s; white-space: nowrap; }
    .btn-add:hover { background: rgba(157,110,240,.22); }
    .btn-add:disabled { opacity: .5; cursor: not-allowed; }
    .btn-add.secondary { border-color: var(--border); background: var(--surface-raised); color: var(--text); }
    .btn-add.secondary:hover { background: rgba(255,255,255,.06); }
    .btn-add.icon {
      width: 34px; height: 34px; padding: 0; border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .tv-add-menu {
      position: absolute; right: 0; top: calc(100% + 8px); z-index: 10;
      min-width: 152px; padding: 6px; border-radius: 12px;
      border: 1px solid var(--border-strong); background: var(--surface);
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
      display: none; flex-direction: column; gap: 6px;
    }
    .tv-add-menu.open { display: flex; }
    .btn-remove { width: 44px; height: 44px; padding: 0; border-radius: 10px; border: 1px solid var(--red-border); background: transparent; color: #fecaca; display: inline-flex; align-items: center; justify-content: center; font-size: 0; font-family: inherit; cursor: pointer; transition: background .15s, transform .15s; }
    .btn-remove svg { width: 18px; height: 18px; }
    .btn-remove:hover { background: rgba(248,113,113,.18); transform: translateY(-1px); }
    .btn-remove:disabled { opacity: .5; cursor: not-allowed; }
    .badge-in-lib { padding: 6px 10px; border-radius: 8px; border: 1px solid var(--green-border); background: var(--green-dim); color: #bbf7d0; font-size: 12px; font-weight: 500; white-space: nowrap; }
    .modal-toast { margin: 0 12px 12px; padding: 10px 14px; border-radius: 10px; font-size: 13px; display: none; }
    .modal-toast.success { border: 1px solid var(--green-border); background: var(--green-dim); color: #bbf7d0; }
    .modal-toast.error { border: 1px solid var(--red-border); background: var(--red-dim); color: #fecaca; }
    .detail-modal {
      width: 100%; max-width: 680px; max-height: calc(100dvh - 100px);
      display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border-strong);
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
    }
    .detail-body { overflow-y: auto; padding: 18px 20px 20px; }
    .detail-loading { color: var(--muted); font-size: 14px; padding: 18px 20px 20px; }
    .detail-hero { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 18px; }
    .detail-poster {
      width: 110px; height: 165px; border-radius: 12px; object-fit: cover; flex-shrink: 0;
      background: var(--surface-raised); border: 1px solid var(--border);
    }
    .detail-poster-ph {
      width: 110px; height: 165px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 36px;
      background: var(--surface-raised); border: 1px solid var(--border);
    }
    .detail-copy { min-width: 0; flex: 1; }
    .detail-title { margin: 0 0 8px; font-size: 24px; font-weight: 700; letter-spacing: -.02em; }
    .detail-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .detail-overview { margin: 0; font-size: 14px; line-height: 1.6; color: #d7deef; }
    .detail-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px; margin-top: 18px;
    }
    .detail-tabs { display: flex; gap: 8px; margin: 18px 0 14px; }
    .detail-tab {
      padding: 8px 12px; border-radius: 999px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: border-color .15s, background .15s, color .15s;
    }
    .detail-tab.active {
      color: #d6b8ff; background: var(--accent-dim); border-color: var(--accent-border);
    }
    .detail-card {
      padding: 14px; border-radius: 14px; border: 1px solid var(--border);
      background: var(--surface-raised);
    }
    .detail-card h3 {
      margin: 0 0 10px; font-size: 13px; letter-spacing: .03em; text-transform: uppercase; color: var(--muted);
    }
    .detail-row { display: flex; flex-direction: column; gap: 4px; }
    .detail-row + .detail-row { margin-top: 10px; }
    .detail-label { font-size: 12px; color: var(--muted); }
    .detail-value { font-size: 14px; color: var(--text); }
    .detail-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
    .toggle-card {
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      padding: 12px 14px; border-radius: 12px; border: 1px solid var(--amber-border);
      background: var(--amber-dim); margin-top: 12px;
    }
    .collection-list { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
    .collection-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 12px;
      border-radius: 12px; border: 1px solid var(--border); background: var(--surface-raised);
    }
    .collection-item-poster {
      width: 40px; height: 60px; border-radius: 8px; object-fit: cover; flex-shrink: 0;
      background: var(--surface); border: 1px solid var(--border);
    }
    .collection-item-ph {
      width: 40px; height: 60px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0; background: var(--surface); border: 1px solid var(--border);
    }
    .collection-item-body { min-width: 0; flex: 1; }
    .collection-item-title { font-size: 14px; font-weight: 600; margin: 0 0 4px; }
    .collection-item-meta { display: flex; flex-wrap: wrap; gap: 6px; font-size: 12px; color: var(--muted); }
    .toggle-copy { min-width: 0; }
    .toggle-title { margin: 0 0 4px; font-size: 13px; font-weight: 600; color: #fef3c7; }
    .toggle-sub { margin: 0; font-size: 12px; color: var(--muted); line-height: 1.5; }
    @media (max-width: 560px) {
      .detail-hero { flex-direction: column; align-items: center; }
      .detail-copy { text-align: center; }
      .detail-meta { justify-content: center; }
      .detail-actions { justify-content: center; flex-wrap: wrap; }
      .toggle-card { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="shell">
  <nav class="topbar">
    <a href="/ui/dashboard" class="brand">
      <div class="brand-icon">
        <img src="/ui/static/fetcherr.svg" alt="Fetcherr" style="width:24px;height:24px;">
      </div>
      <div class="brand-name">Fetcherr</div>
    </a>
    <div class="topbar-right">
      <a class="icon-btn" id="adminLogsBtn" href="/ui/logs" title="Logs" style="display:none">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </a>
      <a class="icon-btn" id="adminSettingsBtn" href="/ui/settings" title="Settings" style="display:none">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </a>
      <button class="icon-btn" id="logoutBtn" title="Sign out" style="display:none" onclick="doLogout()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
      </button>
    </div>
  </nav>

  <div class="page-header">
    <div>
      <h1 class="page-title">Library</h1>
      <p class="page-sub">Browse synced movies and shows, review status, and manage the library.</p>
    </div>
    <div class="header-actions">
      <button class="btn primary" id="syncBtn" onclick="triggerSync()">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Sync Trakt
      </button>
    </div>
  </div>

  <div class="stats">
    <div class="stat movies filterable" id="statCardMovies" onclick="switchTab('movies')">
      <div class="stat-value" id="statMovies">—</div>
      <div class="stat-label">Movies</div>
    </div>
    <div class="stat shows filterable" id="statCardShows" onclick="switchTab('shows')">
      <div class="stat-value" id="statShows">—</div>
      <div class="stat-label">TV Shows</div>
    </div>
  </div>

  <div class="sync-bar">
    <span>Last sync: <strong id="lastSync">—</strong></span>
    <span>Next sync: <strong id="nextSync">—</strong></span>
  </div>

  <div id="syncMsg" class="sync-msg">Sync started — library will update in a moment.</div>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search…" oninput="onSearch()">
    <select id="sortSelect" onchange="onSortChange()">
      <option value="popularity:DESC">Most popular</option>
      <option value="dateAdded:DESC">Recently added</option>
      <option value="dateAdded:ASC">Oldest added</option>
      <option value="title:ASC">Title A→Z</option>
      <option value="title:DESC">Title Z→A</option>
      <option value="year:DESC">Newest release</option>
      <option value="year:ASC">Oldest release</option>
    </select>
  </div>

  <div class="items" id="itemsList"></div>
</div>

<!-- Library item details modal -->
<div class="modal-overlay" id="detailModal" onclick="closeDetailOnOverlay(event)">
  <div class="detail-modal">
    <div class="modal-head">
      <div class="modal-head-row">
        <h2 class="modal-title">Title Details</h2>
        <button class="modal-close" onclick="closeDetail()">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="detail-loading" id="detailLoading">Loading title details…</div>
    <div class="detail-body" id="detailBody" style="display:none"></div>
  </div>
</div>

<button class="fab" onclick="openSearch()" title="Add to Library">
  <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 5v14M5 12h14"/>
  </svg>
</button>

<!-- Add to Library modal -->
<div class="modal-overlay" id="searchModal" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-row">
        <h2 class="modal-title">Add to Library</h2>
        <button class="modal-close" onclick="closeSearch()">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="modal-search-row">
        <input id="searchQuery" type="text" placeholder="Search movies or TV shows…" oninput="onModalSearch()" autocomplete="off">
      </div>
    </div>
    <div class="modal-toast" id="modalToast"></div>
    <div class="modal-body" id="searchResults">
      <div class="search-empty">Search for a title to add it to your library.</div>
    </div>
  </div>
</div>

<script>
  let currentTab = 'all'
  let searchTimer = null
  let openTvMenuTmdbId = null
  let activeDetailItem = null
  let activeDetailTab = 'overview'
  let activeDetailData = null
  let defaultShowAddMode = 'all'
  const librarySortStorageKey = 'fetcherr.librarySort'

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;')
  }

  function fmtRelTime(iso) {
    if (!iso) return '—'
    const diff = new Date(iso) - Date.now()
    const abs  = Math.abs(diff)
    const mins = Math.round(abs / 60000)
    const hrs  = Math.round(abs / 3600000)
    if (diff < 0) {
      if (mins < 60) return `${mins}m ago`
      return `${hrs}h ago`
    }
    if (mins < 60) return `in ${mins}m`
    return `in ${hrs}h`
  }

  function fmtDate(iso) {
    if (!iso) return '—'
    return new Date(iso).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
  }

  function fmtShortDate(iso) {
    if (!iso) return '—'
    return new Date(`${iso}T12:00:00Z`).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })
  }

  async function loadStats() {
    const res = await fetch('/ui/stats')
    if (!res.ok) return
    const d = await res.json()
    document.getElementById('statMovies').textContent = d.movies
    document.getElementById('statShows').textContent  = d.shows
    document.getElementById('lastSync').textContent   = d.lastSyncAt ? fmtDate(d.lastSyncAt) : '—'
    document.getElementById('nextSync').textContent   = d.nextSyncAt ? fmtRelTime(d.nextSyncAt) : '—'
  }

  function getSort() {
    const [sortBy, sortOrder] = document.getElementById('sortSelect').value.split(':')
    return { sortBy, sortOrder }
  }

  function restoreLibrarySort() {
    let savedSort = null
    try {
      savedSort = localStorage.getItem(librarySortStorageKey)
    } catch {
      return
    }
    if (!savedSort) return

    const sortSelect = document.getElementById('sortSelect')
    const hasOption = [...sortSelect.options].some(option => option.value === savedSort)
    if (hasOption) sortSelect.value = savedSort
  }

  function onSortChange() {
    try {
      localStorage.setItem(librarySortStorageKey, document.getElementById('sortSelect').value)
    } catch {}
    loadItems()
  }

  async function loadItems() {
    const search = document.getElementById('searchInput').value.trim()
    const { sortBy, sortOrder } = getSort()
    const qs = `search=${encodeURIComponent(search)}&sortBy=${sortBy}&sortOrder=${sortOrder}&limit=200`

    if (currentTab === 'all') {
      const [rm, rs] = await Promise.all([
        fetch(`/ui/movies?${qs}`).then(r => r.ok ? r.json() : { items: [] }),
        fetch(`/ui/shows?${qs}`).then(r => r.ok ? r.json() : { items: [] }),
      ])
      const movies = rm.items.map(m => ({ ...m, _type: 'movies' }))
      const shows  = rs.items.map(s => ({ ...s, _type: 'shows' }))
      const merged = [...movies, ...shows].sort((a, b) => {
        if (sortBy === 'title') return sortOrder === 'ASC'
          ? a.title.localeCompare(b.title)
          : b.title.localeCompare(a.title)
        if (sortBy === 'year') {
          const aTime = a.releaseSortDate ? new Date(a.releaseSortDate).getTime() : (a.year || 0)
          const bTime = b.releaseSortDate ? new Date(b.releaseSortDate).getTime() : (b.year || 0)
          return sortOrder === 'ASC' ? aTime - bTime : bTime - aTime
        }
        if (sortBy === 'dateAdded') {
          const aTime = a.syncedAt ? new Date(a.syncedAt).getTime() : 0
          const bTime = b.syncedAt ? new Date(b.syncedAt).getTime() : 0
          return sortOrder === 'ASC' ? aTime - bTime : bTime - aTime
        }
        return sortOrder === 'ASC' ? a.popularity - b.popularity : b.popularity - a.popularity
      })
      renderItems(merged, 'all')
      return
    }

    const url = currentTab === 'movies'
      ? `/ui/movies?${qs}`
      : `/ui/shows?${qs}`
    const res = await fetch(url)
    if (!res.ok) return
    const d = await res.json()
    renderItems(d.items, currentTab)
  }

  function renderItems(items, tab) {
    const el = document.getElementById('itemsList')
    if (!items.length) {
      el.innerHTML = '<div class="empty">No items found.</div>'
      return
    }
    el.innerHTML = items.map(item => {
      const itemType = item._type || tab  // 'movies' or 'shows'
      const isShow   = itemType === 'shows'
      const emoji    = isShow ? '📺' : '🎬'
      const poster   = item.posterUrl
        ? `<img class="item-poster" src="${item.posterUrl}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="item-poster-placeholder" style="display:none">${emoji}</div>`
        : `<div class="item-poster-placeholder">${emoji}</div>`

      const imdbLink = item.imdbId
        ? `<a class="item-link" href="https://www.imdb.com/title/${item.imdbId}" target="_blank" onclick="event.stopPropagation()">IMDb ↗</a>`
        : ''
      const removeBtn = item.manualAdded
        ? `<button class="btn-remove" title="Remove manual item" aria-label="Remove manual item" onclick="event.stopPropagation(); removeItem(${item.tmdbId}, '${isShow ? 'tv' : 'movie'}', this)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>`
        : ''
      const showModeToggle = isShow
        ? `<div class="item-mode-toggle" onclick="event.stopPropagation()">
             <button
               class="item-mode-btn ${item.libraryMode === 'all' ? 'active' : ''}"
               onclick="event.stopPropagation(); setShowLibraryMode(${item.tmdbId}, 'all', this)"
             >Entire Series</button>
             <button
               class="item-mode-btn ${item.libraryMode === 'latest' ? 'active' : ''}"
               onclick="event.stopPropagation(); setShowLibraryMode(${item.tmdbId}, 'latest', this)"
             >Latest Season</button>
           </div>`
        : ''

      let metaRight = ''
      if (tab === 'all') {
        const typePill = `<span class="pill ${isShow ? 'accent' : 'blue'}">${isShow ? 'TV Show' : 'Movie'}</span>`
        if (isShow) {
          const seasons = item.numSeasons
            ? `<span class="pill">${item.numSeasons} season${item.numSeasons !== 1 ? 's' : ''}</span>` : ''
          metaRight = typePill + seasons
        } else {
          const runtime = item.runtimeMins ? `<span class="pill">${item.runtimeMins}m</span>` : ''
          const pending = item.pendingLabel ? `<span class="pill amber">${item.pendingLabel}</span>` : ''
          metaRight = typePill + pending + runtime
        }
      } else if (!isShow) {
        const genres  = (item.genres || []).slice(0, 2).map(g => `<span class="pill">${g}</span>`).join('')
        const runtime = item.runtimeMins ? `<span class="pill">${item.runtimeMins}m</span>` : ''
        const pending = item.pendingLabel ? `<span class="pill amber">${item.pendingLabel}</span>` : ''
        metaRight = pending + genres + runtime
      } else {
        const statusColor = item.status === 'Ended' || item.status === 'Canceled' ? '' : 'green'
        const statusPill  = item.status ? `<span class="pill ${statusColor}">${item.status}</span>` : ''
        const seasons     = item.numSeasons
          ? `<span class="pill blue">${item.numSeasons} season${item.numSeasons !== 1 ? 's' : ''}</span>` : ''
        metaRight = statusPill + seasons
      }

      return `<div class="item" onclick="activeDetailTab='overview'; openItemDetail('${isShow ? 'tv' : 'movie'}', ${item.tmdbId})">
        ${poster}
        <div class="item-body">
          <div class="item-title">${escapeHtml(item.title)}</div>
          <div class="item-meta">
            <span class="item-year">${escapeHtml(item.year || '')}</span>
            ${metaRight}
            ${imdbLink}
          </div>
        </div>
        <div class="item-actions">${showModeToggle}${removeBtn}</div>
      </div>`
    }).join('')
  }

  function switchTab(tab) {
    currentTab = currentTab === tab ? 'all' : tab
    document.getElementById('statCardMovies').classList.toggle('active', currentTab === 'movies')
    document.getElementById('statCardShows').classList.toggle('active', currentTab === 'shows')
    loadItems()
  }

  function onSearch() {
    clearTimeout(searchTimer)
    searchTimer = setTimeout(loadItems, 250)
  }

  async function triggerSync() {
    const btn = document.getElementById('syncBtn')
    btn.disabled = true
    btn.textContent = 'Syncing…'
    try {
      await fetch('/sync', { method: 'POST' })
      const msg = document.getElementById('syncMsg')
      msg.style.display = 'block'
      setTimeout(() => { msg.style.display = 'none' }, 5000)
    } finally {
      btn.disabled = false
      btn.innerHTML = `<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Sync Trakt`
    }
  }

  function showSyncMsg(text) {
    const msg = document.getElementById('syncMsg')
    msg.textContent = text
    msg.style.display = 'block'
    setTimeout(() => { msg.style.display = 'none' }, 5000)
  }

  async function removeItem(tmdbId, type, btn) {
    btn.disabled = true
    const icon = btn.innerHTML
    btn.innerHTML = '…'
    const res = await fetch('/ui/library/remove', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tmdbId, type }),
    })
    const d = await res.json().catch(() => ({}))
    if (!res.ok) {
      btn.disabled = false
      btn.innerHTML = icon
      showSyncMsg(d.error || 'Failed to remove item from library.')
      return
    }

    if (d.removedFromLibrary) {
      showSyncMsg('Removed from library.')
    } else if (d.removedManual && d.stillPresent) {
      showSyncMsg('Removed manual library entry. Item remains via another source.')
    } else if (!d.removedManual) {
      showSyncMsg('Item is not manually added.')
    } else {
      showSyncMsg('Updated library sources.')
    }

    if (activeDetailItem && activeDetailItem.tmdbId === tmdbId && activeDetailItem.type === type) {
      closeDetail()
    }
    await Promise.all([loadStats(), loadItems()])
  }

  async function openItemDetail(type, tmdbId) {
    activeDetailItem = { type, tmdbId }
    document.getElementById('detailModal').classList.add('open')
    document.getElementById('detailLoading').style.display = ''
    document.getElementById('detailBody').style.display = 'none'
    document.getElementById('detailBody').innerHTML = ''
    document.removeEventListener('keydown', onDetailKey)
    document.addEventListener('keydown', onDetailKey)

    const res = await fetch(`/ui/library/item?type=${encodeURIComponent(type)}&tmdbId=${tmdbId}`)
    const data = await res.json().catch(() => ({}))
    if (!res.ok) {
      document.getElementById('detailLoading').textContent = data.error || 'Failed to load title details.'
      return
    }

    activeDetailData = data
    renderDetail(data)
    document.getElementById('detailLoading').style.display = 'none'
    document.getElementById('detailBody').style.display = ''
  }

  function closeDetail() {
    activeDetailItem = null
    activeDetailData = null
    document.getElementById('detailModal').classList.remove('open')
    document.getElementById('detailBody').innerHTML = ''
    document.getElementById('detailLoading').textContent = 'Loading title details…'
    document.removeEventListener('keydown', onDetailKey)
  }

  function closeDetailOnOverlay(e) {
    if (e.target === document.getElementById('detailModal')) closeDetail()
  }

  function onDetailKey(e) {
    if (e.key === 'Escape') closeDetail()
  }

  function setDetailTab(tab) {
    activeDetailTab = tab
    if (activeDetailData) renderDetail(activeDetailData)
  }

  function renderDetail(item) {
    const isShow = item.type === 'tv'
    const poster = item.posterUrl
      ? `<img class="detail-poster" src="${item.posterUrl}" alt="">`
      : `<div class="detail-poster-ph">${isShow ? '📺' : '🎬'}</div>`
    const libraryPill = item.visibleToInfuse
      ? '<span class="pill green">Visible to Infuse</span>'
      : '<span class="pill amber">Hidden from Infuse</span>'
    const manualPill = item.manualAdded
      ? '<span class="pill blue">Manually Added</span>'
      : ''
    const imdbLink = item.imdbId
      ? `<a class="btn" href="https://www.imdb.com/title/${item.imdbId}" target="_blank" rel="noreferrer">IMDb ↗</a>`
      : ''
    const libraryModeValue = item.libraryMode === 'latest' ? 'Latest Season' : 'Entire Series'
    const hasCollection = !isShow && Array.isArray(item.collectionItems) && item.collectionItems.length > 0
    if (!hasCollection && activeDetailTab === 'collection') activeDetailTab = 'overview'

    let timingCard = ''
    if (isShow) {
      const nextEpisodeValue = item.nextEpisodeAirDate
        ? `${fmtShortDate(item.nextEpisodeAirDate)}${item.nextEpisodeName ? ` · ${escapeHtml(item.nextEpisodeName)}` : ''}`
        : 'No upcoming episode on record'
      const nextEpisodeCode = item.nextEpisodeSeasonNumber && item.nextEpisodeEpisodeNumber
        ? `S${item.nextEpisodeSeasonNumber}E${item.nextEpisodeEpisodeNumber}`
        : '—'
      timingCard = `
        <div class="detail-card">
          <h3>Episode Timing</h3>
          <div class="detail-row">
            <div class="detail-label">Next expected air date</div>
            <div class="detail-value">${nextEpisodeValue}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">Episode</div>
            <div class="detail-value">${nextEpisodeCode}</div>
          </div>
        </div>
      `
    } else {
      timingCard = `
        <div class="detail-card">
          <h3>Release Timing</h3>
          <div class="detail-row">
            <div class="detail-label">Expected eligible date</div>
            <div class="detail-value">${fmtShortDate(item.eligibleDate)}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">Digital release date</div>
            <div class="detail-value">${fmtShortDate(item.digitalReleaseDate)}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">Theatrical release date</div>
            <div class="detail-value">${fmtShortDate(item.releaseDate)}</div>
          </div>
        </div>
      `
    }

    const statusCard = `
      <div class="detail-card">
        <h3>Library Status</h3>
        <div class="detail-row">
          <div class="detail-label">Status</div>
          <div class="detail-value">${escapeHtml(item.libraryStatusLabel || '—')}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Visible to Infuse</div>
          <div class="detail-value">${item.visibleToInfuse ? 'Yes' : 'No'}</div>
        </div>
        ${item.inLibrary && isShow ? `
          <div class="detail-row">
            <div class="detail-label">Series mode</div>
            <div class="detail-value">${escapeHtml(libraryModeValue)}</div>
          </div>
        ` : item.manualAdded ? `
          <div class="detail-row">
            <div class="detail-label">Library source</div>
            <div class="detail-value">Manual Movie</div>
          </div>
        ` : ''}
        ${isShow ? `
          <div class="detail-row">
            <div class="detail-label">Series status</div>
            <div class="detail-value">${escapeHtml(item.status || '—')}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">Seasons</div>
            <div class="detail-value">${escapeHtml(item.numSeasons || '—')}</div>
          </div>
        ` : ''}
      </div>
    `

    const movieOverrideCard = (!isShow && (!item.visibleToInfuse || item.releaseGateOverridden))
      ? `
        <div class="toggle-card">
          <div class="toggle-copy">
            <p class="toggle-title">Release Window</p>
            <p class="toggle-sub">${item.releaseGateOverridden
              ? `Added early via override. Switch back to wait for your default ${escapeHtml((item.releaseWindowLabel || 'release window').toLowerCase())} before showing it in clients.`
              : `This film has not reached your current ${escapeHtml((item.releaseWindowLabel || 'release window').toLowerCase())}${item.eligibleDate ? ` (est. ${fmtShortDate(item.eligibleDate)})` : ''}. Add it now or wait.`}</p>
          </div>
          <button
            class="btn"
            onclick="toggleMovieAvailabilityOverride(${item.tmdbId}, ${item.releaseGateOverridden ? 'false' : 'true'}, this)"
          >${item.releaseGateOverridden ? `Wait for ${escapeHtml(item.releaseWindowLabel || 'Default Window')}` : 'Add Now'}</button>
        </div>
      `
      : ''

    const showModeCard = (isShow && item.inLibrary)
      ? `
        <div class="toggle-card">
          <div class="toggle-copy">
            <p class="toggle-title">Series Mode</p>
            <p class="toggle-sub">Choose whether Fetcherr keeps the whole series visible in clients or limits this show to its latest season.</p>
          </div>
          <div class="item-actions">
            <button
              class="btn ${item.libraryMode === 'all' ? 'btn-primary' : ''}"
              onclick="setShowLibraryMode(${item.tmdbId}, 'all', this, true)"
            >Entire Series</button>
            <button
              class="btn ${item.libraryMode === 'latest' ? 'btn-primary' : ''}"
              onclick="setShowLibraryMode(${item.tmdbId}, 'latest', this, true)"
            >Latest Season</button>
          </div>
        </div>
      `
      : ''

    const removeAction = item.manualAdded
      ? `<button class="btn" style="border-color: var(--red-border); background: var(--red-dim); color: #fecaca;" onclick="removeItem(${item.tmdbId}, '${item.type}', this)">Remove from Library</button>`
      : ''

    const tabs = hasCollection
      ? `
        <div class="detail-tabs">
          <button class="detail-tab ${activeDetailTab === 'overview' ? 'active' : ''}" onclick="setDetailTab('overview')">Overview</button>
          <button class="detail-tab ${activeDetailTab === 'collection' ? 'active' : ''}" onclick="setDetailTab('collection')">Collection</button>
        </div>
      `
      : ''

    const collectionPanel = hasCollection
      ? `
        <div class="collection-list">
          ${item.collectionItems.map(entry => {
            const poster = entry.posterUrl
              ? `<img class="collection-item-poster" src="${entry.posterUrl}" alt="">`
              : '<div class="collection-item-ph">🎬</div>'
            const action = entry.inLibrary
              ? '<span class="badge-in-lib">In Library</span>'
              : `<button class="btn-add" onclick="addCollectionMovie(${entry.tmdbId}, this)">Add</button>`
            return `
              <div class="collection-item">
                ${poster}
                <div class="collection-item-body">
                  <div class="collection-item-title">${escapeHtml(entry.title)}</div>
                  <div class="collection-item-meta">
                    <span>${escapeHtml(entry.year || '—')}</span>
                    <span class="pill">Movie</span>
                    <span>${fmtShortDate(entry.releaseDate)}</span>
                  </div>
                </div>
                <div class="item-actions">${action}</div>
              </div>
            `
          }).join('')}
        </div>
      `
      : ''

    const overviewPanel = `
      <div class="detail-hero">
        ${poster}
        <div class="detail-copy">
          <h2 class="detail-title">${escapeHtml(item.title)}${item.year ? ` <span style="color:var(--muted);font-weight:500">(${escapeHtml(item.year)})</span>` : ''}</h2>
          <div class="detail-meta">
            ${libraryPill}
            ${manualPill}
          </div>
          <p class="detail-overview">${escapeHtml(item.overview || 'No description available yet.')}</p>
        </div>
      </div>
      <div class="detail-grid">
        ${statusCard}
        ${timingCard}
      </div>
      ${showModeCard}
      ${movieOverrideCard}
      <div class="detail-actions">
        ${imdbLink}
        ${removeAction}
      </div>
    `

    document.getElementById('detailBody').innerHTML = `
      ${tabs}
      ${activeDetailTab === 'collection' ? collectionPanel : overviewPanel}
    `
  }

  async function toggleMovieAvailabilityOverride(tmdbId, ignoreReleaseGate, btn) {
    btn.disabled = true
    const original = btn.textContent
    btn.textContent = 'Updating…'
    const res = await fetch('/ui/library/movie-availability', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tmdbId, ignoreReleaseGate }),
    })
    const data = await res.json().catch(() => ({}))
    if (!res.ok) {
      btn.disabled = false
      btn.textContent = original
      showSyncMsg(data.error || 'Failed to update movie availability.')
      return
    }
    showSyncMsg(ignoreReleaseGate ? 'Movie added ahead of digital release.' : 'Movie will wait for digital release again.')
    await Promise.all([
      loadItems(),
      loadStats(),
      openItemDetail('movie', tmdbId),
    ])
  }

  async function setShowLibraryMode(tmdbId, mode, btn, refreshDetail = false) {
    const container = btn.closest('.item-actions') || btn.parentElement
    const buttons = container ? [...container.querySelectorAll('button')] : [btn]
    buttons.forEach(el => { el.disabled = true })
    const res = await fetch('/ui/library/show-mode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tmdbId, mode }),
    })
    const data = await res.json().catch(() => ({}))
    if (!res.ok) {
      buttons.forEach(el => { el.disabled = false })
      showSyncMsg(data.error || 'Failed to update series mode.')
      return
    }
    showSyncMsg(`"${data.title}" set to ${mode === 'latest' ? 'latest season' : 'entire series'}.`)
    const updates = [loadItems(), loadStats()]
    if (refreshDetail) updates.push(openItemDetail('tv', tmdbId))
    await Promise.all(updates)
  }

  async function addCollectionMovie(tmdbId, btn) {
    btn.disabled = true
    const original = btn.textContent
    btn.textContent = 'Adding…'
    const res = await fetch('/ui/library/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tmdbId, type: 'movie', mode: 'all' }),
    })
    const data = await res.json().catch(() => ({}))
    if (!res.ok) {
      btn.disabled = false
      btn.textContent = original
      showSyncMsg(data.error || 'Failed to add movie.')
      return
    }
    showSyncMsg(`"${data.title}" added to library.`)
    await Promise.all([
      loadItems(),
      loadStats(),
      openItemDetail(activeDetailItem?.type || 'movie', activeDetailItem?.tmdbId || tmdbId),
    ])
  }

  async function doLogout() {
    await fetch('/ui/auth/logout', { method: 'POST' })
    window.location.href = '/ui/login'
  }

  async function checkAuth() {
    const res = await fetch('/ui/auth/check')
    if (res.status === 401) { window.location.href = '/ui/login'; return }
    if (res.ok) {
      const d = await res.json()
      if (d.authEnabled) document.getElementById('logoutBtn').style.display = ''
      if (d.role === 'admin') {
        document.getElementById('adminLogsBtn').style.display = ''
        document.getElementById('adminSettingsBtn').style.display = ''
      }
    }
  }

  async function loadClientConfig() {
    const res = await fetch('/ui/client-config')
    if (!res.ok) return
    const d = await res.json().catch(() => ({}))
    defaultShowAddMode = d.showAddDefaultMode === 'latest' ? 'latest' : 'all'
  }

  restoreLibrarySort()
  loadStats()
  loadClientConfig()
  loadItems()
  checkAuth()
  setInterval(loadStats, 60000)

  // ── Search modal ────────────────────────────────────────────────────────────
  let searchTimer2 = null
  const inLibrarySet = new Set()

  function openSearch() {
    document.getElementById('searchModal').classList.add('open')
    document.getElementById('searchQuery').focus()
    document.addEventListener('keydown', onModalKey)
  }

  function closeSearch() {
    document.getElementById('searchModal').classList.remove('open')
    document.removeEventListener('keydown', onModalKey)
    openTvMenuTmdbId = null
  }

  function closeOnOverlay(e) {
    if (e.target === document.getElementById('searchModal')) closeSearch()
  }

  function onModalKey(e) { if (e.key === 'Escape') closeSearch() }

  function onModalSearch() {
    clearTimeout(searchTimer2)
    searchTimer2 = setTimeout(runSearch, 350)
  }

  async function runSearch() {
    const q  = document.getElementById('searchQuery').value.trim()
    const el = document.getElementById('searchResults')
    if (q.length < 2) {
      el.innerHTML = '<div class="search-empty">Search for a title to add it to your library.</div>'
      return
    }
    el.innerHTML = '<div class="search-empty">Searching…</div>'
    const qs = encodeURIComponent(q)
    const [rm, rt] = await Promise.all([
      fetch(`/ui/search?q=${qs}&type=movie`).then(r => r.ok ? r.json() : { results: [] }).catch(() => ({ results: [] })),
      fetch(`/ui/search?q=${qs}&type=tv`).then(r => r.ok ? r.json() : { results: [] }).catch(() => ({ results: [] })),
    ])
    // Interleave movie and TV results so both types surface early
    const movies = rm.results ?? [], tv = rt.results ?? []
    const results = []
    for (let i = 0; i < Math.max(movies.length, tv.length); i++) {
      if (i < movies.length) results.push(movies[i])
      if (i < tv.length) results.push(tv[i])
    }
    if (!results.length) {
      el.innerHTML = '<div class="search-empty">No results found.</div>'
      return
    }
    el.innerHTML = results.map(r => {
      const poster = r.poster
        ? `<img class="result-poster" src="${r.poster}" alt="" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
          + `<div class="result-poster-ph" style="display:none">${r.type === 'tv' ? '📺' : '🎬'}</div>`
        : `<div class="result-poster-ph">${r.type === 'tv' ? '📺' : '🎬'}</div>`
      const tvPrimaryMode = defaultShowAddMode === 'latest' ? 'latest' : 'all'
      const tvSecondaryMode = tvPrimaryMode === 'latest' ? 'all' : 'latest'
      const action = r.inLibrary || inLibrarySet.has(r.tmdbId)
        ? `<span class="badge-in-lib">In Library</span>`
        : r.type === 'tv'
          ? `<div class="result-action-stack">
              <button class="btn-add icon" title="Add TV show" aria-label="Add TV show" onclick="toggleTvAddMenu(${r.tmdbId}, event)">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 5v14M5 12h14"/>
                </svg>
              </button>
              <div class="tv-add-menu ${openTvMenuTmdbId === r.tmdbId ? 'open' : ''}" id="tvAddMenu-${r.tmdbId}" onclick="event.stopPropagation()">
                <button class="btn-add" onclick="addItem(${r.tmdbId},'${r.type}','${tvPrimaryMode}',this)">${tvPrimaryMode === 'latest' ? 'Latest Season' : 'Entire Series'}</button>
                <button class="btn-add secondary" onclick="addItem(${r.tmdbId},'${r.type}','${tvSecondaryMode}',this)">${tvSecondaryMode === 'latest' ? 'Latest Season' : 'Entire Series'}</button>
              </div>
            </div>`
          : `<button class="btn-add icon" title="Add movie" aria-label="Add movie" onclick="addItem(${r.tmdbId},'${r.type}','all',this)">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14M5 12h14"/>
              </svg>
            </button>`
      return `<div class="search-result">
        ${poster}
        <div class="result-body">
          <div class="result-title">${escapeHtml(r.title)}</div>
          <div class="result-meta">
            <span>${escapeHtml(r.year || '—')}</span>
            <span class="pill">${r.type === 'tv' ? 'TV Show' : 'Movie'}</span>
          </div>
        </div>
        <div class="result-actions">${action}</div>
      </div>`
    }).join('')
  }

  function toggleTvAddMenu(tmdbId, event) {
    event.stopPropagation()
    const previous = openTvMenuTmdbId
    openTvMenuTmdbId = openTvMenuTmdbId === tmdbId ? null : tmdbId

    if (previous != null && previous !== tmdbId) {
      const prevMenu = document.getElementById(`tvAddMenu-${previous}`)
      if (prevMenu) prevMenu.classList.remove('open')
    }

    const currentMenu = document.getElementById(`tvAddMenu-${tmdbId}`)
    if (currentMenu) currentMenu.classList.toggle('open', openTvMenuTmdbId === tmdbId)
  }

  document.addEventListener('click', () => {
    if (openTvMenuTmdbId == null) return
    const menu = document.getElementById(`tvAddMenu-${openTvMenuTmdbId}`)
    if (menu) menu.classList.remove('open')
    openTvMenuTmdbId = null
  })

  async function addItem(tmdbId, type, mode, btn) {
    const actions = btn.closest('.result-actions')
    const buttons = actions ? [...actions.querySelectorAll('button')] : [btn]
    buttons.forEach(el => { el.disabled = true })
    btn.disabled = true
    btn.textContent = 'Adding…'
    const res = await fetch('/ui/library/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tmdbId, type, mode }),
    })
    const d = await res.json().catch(() => ({}))
    if (res.ok) {
      inLibrarySet.add(tmdbId)
      openTvMenuTmdbId = null
      const badge = Object.assign(document.createElement('span'), { className: 'badge-in-lib', textContent: 'In Library' })
      if (actions) actions.replaceWith(badge)
      else btn.replaceWith(badge)
      showModalToast(`"${d.title}" added as ${type === 'tv' && mode === 'latest' ? 'latest season' : (type === 'tv' ? 'entire series' : 'movie')}.`, 'success')
      Promise.all([loadStats(), loadItems()])
    } else {
      buttons.forEach(el => { el.disabled = false })
      btn.innerHTML = mode === 'latest'
        ? 'Latest Season'
        : (type === 'tv'
          ? 'Entire Series'
          : `<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
               <path d="M12 5v14M5 12h14"/>
             </svg>`)
      showModalToast(d.error || 'Failed to add item.', 'error')
    }
  }

  function showModalToast(msg, kind) {
    const el = document.getElementById('modalToast')
    el.textContent = msg
    el.className = `modal-toast ${kind}`
    el.style.display = ''
    setTimeout(() => { el.style.display = 'none' }, 4000)
  }
</script>
