<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Fetcherr · Setup</title>
  <link rel="icon" type="image/svg+xml" href="/ui/static/fetcherr.svg">
  <style>
    :root {
      --bg: #0b0d12; --surface: #12151d; --surface-raised: #181c26;
      --border: rgba(255,255,255,.07); --border-strong: rgba(255,255,255,.12);
      --text: #eef2ff; --muted: #8892a4;
      --accent: #9d6ef0; --accent-dim: rgba(157,110,240,.15); --accent-border: rgba(157,110,240,.35);
      --green: #4ade80; --green-dim: rgba(74,222,128,.12); --green-border: rgba(74,222,128,.3);
      --amber: #fbbf24; --amber-dim: rgba(251,191,36,.1);   --amber-border: rgba(251,191,36,.28);
      --red: #f87171;   --red-dim: rgba(248,113,113,.1);    --red-border: rgba(248,113,113,.28);
      --blue: #60a5fa;  --blue-dim: rgba(96,165,250,.1);    --blue-border: rgba(96,165,250,.28);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .shell { max-width: 760px; margin: 0 auto; padding: 20px 20px 60px; }

    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 14px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface); margin-bottom: 28px; }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
    .brand-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--accent-dim); border: 1px solid var(--accent-border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .brand-icon svg { width: 16px; height: 16px; color: #c4b5fd; }
    .brand-name { font-size: 16px; font-weight: 650; letter-spacing: -.01em; }
    .brand-tag { font-size: 11px; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; }
    .topbar-right { display: flex; gap: 8px; }
    .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; text-decoration: none; transition: color .15s, background .15s; }
    .icon-btn:hover { color: var(--text); background: var(--surface-raised); }

    .page-header { margin-bottom: 24px; }
    .page-header h1 { margin: 0 0 4px; font-size: 24px; font-weight: 700; letter-spacing: -.02em; }
    .page-header p { margin: 0; color: var(--muted); font-size: 14px; }

    .section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin: 0 0 16px; display: flex; align-items: center; gap: 8px; }

    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; margin-bottom: 6px; font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: .03em; text-transform: uppercase; }

    .status-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,.02); margin-top: 10px; }
    .status-meta { font-size: 13px; color: var(--muted); min-width: 0; }
    .status-meta strong { display: block; color: var(--text); font-size: 14px; font-weight: 600; margin-bottom: 2px; }

    .pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; white-space: nowrap; border: 1px solid var(--border); color: var(--muted); background: transparent; }
    .pill.ok     { border-color: var(--green-border); background: var(--green-dim); color: #bbf7d0; }
    .pill.pending{ border-color: var(--amber-border); background: var(--amber-dim); color: #fef3c7; }
    .pill.err    { border-color: var(--red-border);   background: var(--red-dim);   color: #fecaca; }
    .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .8; flex-shrink: 0; }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface-raised); color: var(--text); font-size: 14px; font-family: inherit; font-weight: 500; cursor: pointer; white-space: nowrap; transition: background .15s, border-color .15s; }
    .btn:hover { background: rgba(255,255,255,.06); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn.primary { background: var(--accent-dim); border-color: var(--accent-border); color: #d8c6ff; }
    .btn.primary:hover { background: rgba(157,110,240,.22); }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 14px; }

    .callout { margin-top: 14px; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,.03); color: var(--muted); font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
    .callout a { color: #c4b5fd; }
    .callout.success { color: #bbf7d0; border-color: var(--green-border); background: var(--green-dim); }
    .callout.error   { color: #fecaca; border-color: var(--red-border);   background: var(--red-dim); }
    .callout.info    { color: #bfdbfe; border-color: var(--blue-border);  background: var(--blue-dim); }

    .config-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .config-row:last-child { border-bottom: none; padding-bottom: 0; }
    .config-key { color: var(--muted); }
    .config-val { color: var(--text); font-weight: 500; font-family: ui-monospace, monospace; font-size: 12px; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
    .config-val.masked { opacity: .6; }
  </style>
</head>
<body>
<div class="shell">
  <nav class="topbar">
    <a href="/ui/dashboard" class="brand">
      <div class="brand-icon">
        <img src="/ui/static/fetcherr.svg" alt="Fetcherr" style="width:24px;height:24px;">
      </div>
      <div class="brand-name">Fetcherr</div>
    </a>
    <div class="topbar-right">
      <a class="icon-btn" href="/ui/logs" title="Logs">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </a>
      <a class="icon-btn" href="/ui/dashboard" title="Dashboard">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </a>
      <button class="icon-btn" id="logoutBtn" title="Sign out" style="display:none" onclick="doLogout()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
      </button>
    </div>
  </nav>

  <div class="page-header">
    <h1>Setup</h1>
    <p>Connect Trakt and review the active sync sources.</p>
  </div>

  <!-- Trakt -->
  <div class="section">
    <div class="section-title">
      <img src="/ui/static/trakt.png" alt="Trakt" style="width:18px;height:18px;border-radius:4px;vertical-align:middle;">
      Trakt
    </div>
    <div class="status-row">
      <div class="status-meta">
        <strong>Connection</strong>
        <div id="traktMeta">Checking…</div>
      </div>
      <div id="traktStatus" class="pill">Checking…</div>
    </div>
    <div class="btn-row">
      <button class="btn primary" onclick="startTrakt()">Connect Trakt</button>
    </div>
    <div id="traktPending" class="callout info" style="display:none"></div>
    <div id="traktOut" style="display:none" class="callout"></div>
  </div>

  <!-- Trakt Lists -->
  <div class="section">
    <div class="section-title">Synced Sources</div>
    <div id="traktListsRows">
      <div style="font-size:13px; color:var(--muted)">Loading…</div>
    </div>
  </div>

  <!-- Active config (read-only, from env) -->
  <div class="section">
    <div class="section-title">Configuration</div>
    <div class="field-note" style="font-size:12px; color:var(--muted); margin-bottom:12px;">These values are read-only here and come from environment variables.</div>
    <div id="configRows"></div>
  </div>
</div>

<script>
  function setPill(id, text, kind = '') {
    const el = document.getElementById(id)
    el.className = ['pill', kind].filter(Boolean).join(' ')
    const dot = kind ? `<span class="pill-dot"></span>` : ''
    el.innerHTML = `${dot}<span>${text}</span>`
  }

  function showOut(msg, kind = '') {
    const el = document.getElementById('traktOut')
    el.style.display = ''
    el.className = ['callout', kind].filter(Boolean).join(' ')
    el.innerHTML = typeof msg === 'string' ? msg : (msg?.error || JSON.stringify(msg))
  }

  async function loadStatus() {
    const res = await fetch('/trakt/auth')
    if (!res.ok) return
    const d = await res.json()
    if (d.authenticated) {
      setPill('traktStatus', 'Connected', 'ok')
      const exp = d.expiresAt ? new Date(d.expiresAt).toLocaleDateString() : ''
      document.getElementById('traktMeta').textContent = exp ? `Token valid until ${exp}` : 'Connected'
    } else {
      setPill('traktStatus', 'Not connected', 'err')
      document.getElementById('traktMeta').textContent = 'No valid Trakt token. Use Connect Trakt to authorize.'
    }
  }

  async function loadConfig() {
    // Pull from the stats endpoint to show what's active
    const res = await fetch('/ui/stats')
    if (!res.ok) return
    const d = await res.json()
    // Show list info
    const rows = document.getElementById('traktListsRows')
    rows.innerHTML = `
      <div class="config-row"><span class="config-key">Watchlist</span><span class="config-val">✓ Enabled</span></div>
      <div class="config-row"><span class="config-key">Shows watchlist</span><span class="config-val">✓ Enabled</span></div>
    `
  }

  async function loadExtraConfig() {
    // We can't expose actual env values, but we can show what's wired
    const configRows = document.getElementById('configRows')
    const fields = [
      ['Server port',   '9990'],
      ['Sync interval', '60 minutes'],
    ]
    configRows.innerHTML = fields.map(([k, v]) =>
      `<div class="config-row"><span class="config-key">${k}</span><span class="config-val">${v}</span></div>`
    ).join('')
  }

  let traktPollInterval = null

  async function startTrakt() {
    document.getElementById('traktOut').style.display = 'none'
    const res = await fetch('/trakt/auth', { method: 'POST' })
    const d = await res.json()
    if (!res.ok) {
      showOut(d.error || 'Failed to start Trakt device auth.', 'error')
      return
    }
    setPill('traktStatus', 'Awaiting authorization', 'pending')
    document.getElementById('traktMeta').textContent = 'Waiting for Trakt authorization.'
    const pending = document.getElementById('traktPending')
    pending.style.display = ''
    pending.innerHTML = `1. Open <a href="${d.verificationUrl}" target="_blank">${d.verificationUrl}</a>\n2. Enter code: <strong>${d.code}</strong>\n3. This page will update automatically once authorised.`

    // Poll until authenticated
    traktPollInterval = setInterval(async () => {
      const r = await fetch('/trakt/auth')
      if (!r.ok) return
      const s = await r.json()
      if (s.authenticated) {
        clearInterval(traktPollInterval)
        pending.style.display = 'none'
        setPill('traktStatus', 'Connected', 'ok')
        document.getElementById('traktMeta').textContent = 'Trakt connected. Starting sync…'
        showOut('Trakt connected. Sync is running in the background.', 'success')
      }
    }, 3000)
  }

  async function doLogout() {
    await fetch('/ui/auth/logout', { method: 'POST' })
    window.location.href = '/ui/login'
  }

  async function checkAuth() {
    const res = await fetch('/ui/auth/check')
    if (res.status === 401) { window.location.href = '/ui/login'; return }
    if (res.ok) {
      const d = await res.json()
      if (d.authEnabled) document.getElementById('logoutBtn').style.display = ''
    }
  }

  loadStatus()
  loadConfig()
  loadExtraConfig()
  checkAuth()
</script>
</body>
</html>
